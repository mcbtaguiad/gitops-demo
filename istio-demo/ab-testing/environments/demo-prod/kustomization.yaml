apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: demo-prod
resources:
  - namespace.yaml
  # shared/common (ONLY ONCE)
  - ../../backend/common
  - ../../monitor/common
  # versions
  - ../../backend/overlays/v1
  - ../../backend/overlays/v2
  - ../../monitor/overlays/v1
  - ../../monitor/overlays/v2
  # others
  - ../../frontend/base
  - ../../redis/base
  # istio
  - ../../istio/base
patches:
  - target:
      group: security.istio.io
      version: v1
      kind: AuthorizationPolicy
      name: read-write-frontend-to-backend
    path: frontend-authpolicy-patch.yaml
  - target:
      group: security.istio.io
      version: v1
      kind: AuthorizationPolicy
      name: read-write-monitor-to-backend
    path: monitor-authpolicy-patch.yaml
  - target:
      group: networking.istio.io
      version: v1
      kind: Gateway
      name: demo-app-gateway
    path: demo-app-gateway-patch.yaml
  - target:
      kind: Deployment
      name: backend-v1
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/mcbtaguiad/istio-demo/backend:fe9d5ceee36519bd3dbab03bc15d3de96e7c8e68
  - target:
      kind: Deployment
      name: backend-v2
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/mcbtaguiad/istio-demo/backend:443601dca07ca88643b310ffa0a76aa3d49c9a7d
  - target:
      kind: Deployment
      name: monitor-v1
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/mcbtaguiad/istio-demo/monitor:fe9d5ceee36519bd3dbab03bc15d3de96e7c8e68
  - target:
      kind: Deployment
      name: monitor-v2
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/mcbtaguiad/istio-demo/monitor:443601dca07ca88643b310ffa0a76aa3d49c9a7d
configMapGenerator:
  - name: backend-config-v1
    literals:
      - VERSION=1.0.0
      - ALLOWED_HOSTS=http://192.168.254.220
  - name: backend-config-v2
    literals:
      - VERSION=2.0.0
      - ALLOWED_HOSTS=http://192.168.254.220
  - name: monitor-config-v1
    literals:
      - VERSION=1.0.0
      - DEMO_APP_HOST=http://192.168.254.220
  - name: monitor-config-v2
    literals:
      - VERSION=2.0.0
      - DEMO_APP_HOST=http://192.168.254.220
